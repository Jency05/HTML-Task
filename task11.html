<!DOCTYPE html>
<html>
    <head>
        <title>Design a course prospectus page using tranform and translate</title>
    </head>
    <style>
      body{
         font-family: Arial, Helvetica, sans-serif;
         background-color: white;
         display: flex;
         justify-content: center;
         align-items: center;
         height: 100vh;
      }
      .container{
         position: relative;
         width: 550px;
         height: 450px;
         display: flex;
         align-items: center;
      }
      .course-card{
         width: 350px;
         background-color: white;
         border-radius: 1px;
         border: 2px dotted black;
         text-align: center;
          z-index:2;
          transition: 0.5s;
      }
      .course-details{
         width: 450px;
         background-color: white;
         border-radius: 1px;
         border: 2px dotted grey;
         text-align: center; 
         box-shadow: 1px 1px 30px grey;
         opacity: 0;
         transform: translateX(-40px);
         transition: 0.5s;
      }
      .course-details p{
         position: relative;
         right: 100px;
      }
      .course-details ol{
         text-align: left;
         position: relative;
         right: 25px;
         
      }
      button{
         padding: 10px;
         background-color: rgb(140, 204, 233);
         border-radius: 5px;
         position: relative;
         left: 70px;

      }
      button:hover{
         transform: scale(1.1);
      }
      .container:hover .card{
         transform: translateX(-120px);
      }
      .container:hover .course-details{
         transform: translateX(0);
         opacity: 1;
      }
    </style>
    <body>
       <div class="container">
         <div class="course-card">
            <img src="work.jpg" alt="office2" height="250px" width="250px">
        <hr>
        <h1>Full Stack Course</h1>
        <hr>
        <p>Development Courses</p>
         </div>
        
       
       <div class="course-details">
        <h1>Full Stack Development Bootcamp</h1>
        <hr>
        <p>courses</p>
         <ol>
            -MERN STACK WEB DEVELOPMENT <br>
            -MEAN STACK WEB DEVELOPMENT <br>
            -PHP FULL STACK WEB DEVELOPMENT <br>
            -PYTHON AND DJANGO FULL STACK WEB DEVELOPMENT
         </ol>
            <br>
            <button>Enquiry Now</button>
       </div>
       </div>
    </body>
</html>
