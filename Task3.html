<!DOCTYPE html>
<html>
    <head>
        <title>
            Create an Application Form
        </title>
        <h1>
            <center><b>Application Form*</b>
            </center>
        </h1>
        <center>
        <body>
            <form action="Task(3.i).html">
                <table>
                    <tr>
                        <td>Name</td>
                        <td><input type="text" placeholder="Enter your name"></td>
                    </tr>
                    <tr>
                        <td>Date</td>
                        <td><input type="datetime-local" name="" id=""></td>
                    </tr>
                    <tr>
                        <td>Email ID</td>
                        <td><input type="text" placeholder="Enter your Email"></td>
                    </tr>
                    <tr>
                        <td>Contact Number</td>
                        <td><input type="tel" placeholder="Enter your Number" maxlength="14"></td>
                    </tr>
                    <tr>
                        <td>Select Country</td>
                        <td><select>
                            <option>Please Select your Country</option>
                            <option>India</option>
                            <option value="">China</option>
                            <option value="">Germany</option>
                            <option value="">France</option>
                        </select></td>
                    </tr>
                    <tr>
                        <td>Select Gender</td>
                        <td>
                            <input type="radio" name="Select Gender">Male
                            <input type="radio" name="Select Gender">Female
                            <input type="radio" name="Select Gender">Others
                        </td>
                    </tr>
                    <tr>
                        <td>Upload Documents</td>
                        <td><input type="file" name="" id=""></td>
                    </tr>
                    <tr>
                        <td>Address</td>
                        <td><textarea placeholder="Enter your address"></textarea></td>
                </table>
                </center>
                <center>
                <button> Next</button>
                </center>
            </form>
        </body>
    </head>
</html>
