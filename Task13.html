<!DOCTYPE html>
<html>
<head>
<title>Sidebar Menu</title>
<style>
    body
{
margin:0;
font-family:Arial;
display:flex;
}


.sidebar
{
width:220px;
height:100vh;
background:#f2f2f2;
padding:20px;
box-shadow:2px 0 5px gray;
}

.menu
{
text-align:center;
margin-bottom:30px;
}

.sidebar ul
{
list-style:none;
padding:0;
}

.sidebar ul li
{
padding:12px;
margin:10px 0;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.sidebar ul li:hover
{
background:#ddd;
}

.active
{
background:#d3d3d3;
}

.main
{
flex:1;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:gray;
}
</style>
</head>

<body>

<div class="sidebar">

<h2 class="menu">Menu</h2>

<ul>
<li class="active">🖥️ Dashboard</li>
<li>📌 Shortcuts</li>
<li>🗠 Overview</li>
<li>📆 Events</li>
<li>🛈 About</li>
<li>🧰 Services</li>
<li>📲 Contact</li>
</ul>

</div>

<div class="main">

<h1>SIDEBAR IN CSS</h1>

</div>

</body>
</html>
