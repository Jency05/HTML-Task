<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design a floating button using animation effect.</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:grid;
            place-items:center;
        }
        a{
            font:700 30px consolas;
            text-decoration: none;
            text-transform: uppercase;
            padding: 20px 60px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            transition: 0.2s;
            transform: scale(4);
        }
        span{
            color: bisque;
        }
        a .liquid{
            position: absolute;
            top: -80px;
            left: 0px;
            width:100%;
            height:100px;
            background: rgb(159, 90, 197)
        } 
    </style>
</head>

<body>
    
</body>
</html>
