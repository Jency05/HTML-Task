<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bus Ticket Booking</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:800px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    display:flex;
    gap:40px;
}

h2{
    margin-bottom:20px;
}

.form-section{
    width:50%;
}

label{
    font-weight:bold;
}

input,select{
    width:100%;
    padding:8px;
    margin:8px 0 15px 0;
}

button{
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:black;
}

.summary{
    width:50%;
}

.summary-box{
    border:1px solid gray;
    padding:15px;
    margin-top:20px;
}
.summary img{
    position: relative;
    left: 40px;
    bottom: 20px;
    width: 280px;

}

</style>
</head>

<body>

<div class="container">

<div class="form-section">

<h2>Bus Ticket Booking</h2>

<label>Enter Bus Name:</label>
<input type="text" id="busname" value="KPN TRAVELS">

<label>Enter Your Age:</label>
<input type="number" id="age" value="18">

<label>Select Bus Route:</label>
<select id="route">
<option>Trichy - Chennai</option>
<option>Chennai - Madurai</option>
<option>Coimbatore - Trichy</option>
</select>

<label>Select Seat Type:</label>
<select id="seat">
<option value="500">Regular Seat (₹500)</option>
<option value="800">Sleeper Seat (₹800)</option>
</select>

<label>Select Bus Type:</label>
<select id="bustype">
<option value="0">Non AC</option>
<option value="100">AC Bus (+₹100)</option>
</select>

<label>Enter Number of Tickets:</label>
<input type="number" id="tickets" value="1">

<button onclick="book()">Submit</button>

</div>


<div class="summary">
    <img src="bus.png" alt="bus">

<h2>Status</h2>

<div class="summary-box">

<h3>Booking Summary</h3>

<p id="sbus">Bus Name - </p>
<p id="sroute">Bus Route - </p>
<p id="sprice">Total price - </p>

</div>

</div>

</div>

<script>

function book(){

let bus=document.getElementById("busname").value
let route=document.getElementById("route").value
let seat=document.getElementById("seat").value
let bustype=document.getElementById("bustype").value
let tickets=document.getElementById("tickets").value

let total=(parseInt(seat)+parseInt(bustype))*tickets

document.getElementById("sbus").innerHTML="Bus Name - "+bus
document.getElementById("sroute").innerHTML="Bus Route - "+route
document.getElementById("sprice").innerHTML="Total Price - ₹"+total

}

</script>

</body>
</html>
