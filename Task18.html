<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>

body{
    font-family: Arial;
    background:#666;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:320px;
    border-radius:8px;
    box-shadow:0 0 10px black;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #999;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:4px;
    font-size:16px;
    cursor:pointer;
}

.error{
    color:red;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>CREATE ACCOUNT</h2>

<form onsubmit="return validateForm()">

<label>Username</label>
<input type="text" id="username">
<div class="error" id="userError"></div>

<label>Email</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>

<label>Password</label>
<input type="password" id="password">
<div class="error" id="passError"></div>

<label>Confirm Password</label>
<input type="password" id="confirm">
<div class="error" id="confirmError"></div>

<button type="submit">Submit</button>

</form>

</div>

<script>

function validateForm()
{
    var username=document.getElementById("username").value;
    var email=document.getElementById("email").value;
    var password=document.getElementById("password").value;
    var confirm=document.getElementById("confirm").value;

    var valid=true;

    document.getElementById("userError").innerHTML="";
    document.getElementById("emailError").innerHTML="";
    document.getElementById("passError").innerHTML="";
    document.getElementById("confirmError").innerHTML="";

    if(username=="")
    {
        document.getElementById("userError").innerHTML="Username cannot be empty";
        valid=false;
    }

    if(email=="")
    {
        document.getElementById("emailError").innerHTML="Email cannot be empty";
        valid=false;
    }

    if(password=="")
    {
        document.getElementById("passError").innerHTML="Password cannot be empty";
        valid=false;
    }

    if(confirm=="")
    {
        document.getElementById("confirmError").innerHTML="Confirm password required";
        valid=false;
    }

    if(password!=confirm)
    {
        document.getElementById("confirmError").innerHTML="Passwords do not match";
        valid=false;
    }

    return valid;
}

</script>

</body>
</html>
