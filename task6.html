<!DOCTYPE html>
<html>
    <head>
        <title>Design a registration form with a custom background property.</title>
        <style>
            body{
                background-image: url(mountain.jpg);
                background-repeat: no-repeat;
                background-size: 1550px 1000px;   
            }
            div{
                height: 380px;
                width: 450px;
                box-shadow:2px 2px 30px rgb(113, 32, 3);
                position:absolute;
                left: 550px;
                bottom: 190px;
                border-radius: 10%;
                backdrop-filter: blur(15px);
                }
                h1{
                    position: relative;
                    left: 5px;
                }
                p{
                    color: rgb(14, 22, 139)  ; 
                }
        </style>
    </head>
    <body>
        <div>
            <form>
                <center>
                    <h1>REGISTRATION</h1>
                    <input type="text" placeholder="Username">
                    <br><br>
                    <input type="text" placeholder="Email Address">
                    <br><br>
                    <input type="text" placeholder="Create Password">
                    <br><br>
                    <input type="text" placeholder="Confirm Password">
                    <br><br>
                    <button>Register Account</button>
                    <p>Already Have an Account?<b><button>Login</button></b></p>
                </center>

            </form>
        </div>
    </body>
</html>
