<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modal Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:url(purple\ bg.png);
background-position: center;
background-repeat: no-repeat;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
}
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}
.modal-box{
background:rgba(0,0,0,0.8);
padding:30px;
border-radius:15px;
width:350px;
color:white;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}
.result-box{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
width:250px;
display:none;
}

</style>
</head>

<body>

<button class="btn btn-primary" onclick="openModal()">Open Login</button>


<div class="overlay" id="overlay">


<div class="modal-box" id="loginBox">

<h3 class="text-center mb-4">Login</h3>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" placeholder="Password">
</div>

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Check me out</label>
</div>

<button class="btn btn-success w-100" onclick="login()">Login</button>

</div>
<div class="result-box" id="successBox">
<h4 class="text-success">SUCCESS!</h4>
<p>Welcome to Website</p>
<button class="btn btn-success" onclick="closeModal()">Continue</button>
</div>


<div class="result-box" id="errorBox">
<h4 class="text-danger">ERROR!</h4>
<p>Something went wrong</p>
<button class="btn btn-danger" onclick="tryAgain()">Try Again</button>
</div>

</div>


<script>

function openModal(){
document.getElementById("overlay").style.display="flex";
}

function closeModal(){
document.getElementById("overlay").style.display="none";
location.reload();
}

function login(){

var email=document.getElementById("email").value;
var pass=document.getElementById("password").value;

document.getElementById("loginBox").style.display="none";

if(email=="jencyfedilia1@gmail.com" && pass=="1234"){
document.getElementById("successBox").style.display="block";
}
else{
document.getElementById("errorBox").style.display="block";
}

}

function tryAgain(){

document.getElementById("errorBox").style.display="none";
document.getElementById("loginBox").style.display="block";

}

</script>

</body>
</html>
