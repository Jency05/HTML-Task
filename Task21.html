<!DOCTYPE html>
<html>
<head>
<title>Random Background Color</title>

<style>

body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
    transition:0.5s;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#444;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#222;
    transform:scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<h1>Random Background Color Change</h1>

<button onclick="changeColor()">Change Color</button>

</div>

<script>

function changeColor()
{
    var letters = "0123456789ABCDEF";
    var color = "#";

    for(var i=0;i<6;i++)
    {
        color += letters[Math.floor(Math.random()*16)];
    }

    document.body.style.backgroundColor = color;
}

</script>

</body>
</html>
