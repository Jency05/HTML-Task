<!DOCTYPE html>
<html>
    <center>
    <head>
        
        <title>Design an HTML page with a card layout using style</title>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, Helvetica, sans-serif;
                background: whitesmoke;
                height: 100vh;
            }
            .card{
                width: 350px;
                background: white;
                border-radius:15px;
                box-shadow: 0px 5px 15px black;
                overflow: hidden;
                text-align: center;


            }
            .card img{
                width: 100%;
                height:200%;
                object-fit: cover;
            }
            .card-content{
                padding: 20px;
            }
            .card h1{
                margin: 10px;
                text-decoration: underline;
                position: relative;
                left: -100px;
            }
            .card p{
                font-size: 14px;
                color: black;
            }
            .button-container{
                display:grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-top: 20px;
            }
            .button-container button{
                padding: 10px;
                border: none;
                background: grey;
                color: aliceblue;
                cursor: pointer;
            }
            .button-container button:hover{
                background: black;
            }
            
        </style>
    </head>
    
    <body>
        <div class="card">
            <img src="t4teq.jpg" alt="t4teq">
            <div class="card-content">
            <h1>T4TEQ</h1>
            <p>T4TEQ Software Soluttions was founded in 2017 in Tiruchirappalli, Tamil Nadu, India.It 
                was evolved from a small training company to a corporate training and development.
            </p>
            <div class="button-container">
               <button>Courses</button>
               <button>Enquire</button>
               <button>Contact</button>
               <button>E-Mail</button>
            </div>
            </div>
        </div>
        
        
    
    </body>
    </center>

</html>
